name: Merge Catalog
run-name: "Merge Catalog${{ inputs.workspace && format(': {0}', inputs.workspace) || ': all pending' }}"

on:
  # Trigger immediately when any extract workflow completes successfully
  workflow_run:
    workflows:
      - "Extract (GitHub Runner)"
      - "Extract (Hetzner Runner)"
      - "Extract (HuggingFace Jobs)"
    types: [completed]

  # Backstop: catch any merges dropped by the concurrency group's 1-pending limit
  schedule:
    - cron: '*/10 * * * *'

  # Manual trigger for debugging or single-workspace merge
  workflow_dispatch:
    inputs:
      workspace:
        required: false
        type: string
        default: ""
        description: "Workspace to merge (empty = all pending workspaces)"
      storage:
        required: false
        type: string
        default: ""
        description: "Specific storage target (empty = all workspace storages)"

# Serial execution: only one merge at a time, queued (not cancelled).
# GitHub allows 1 running + 1 pending. The --all mode ensures each run
# merges ALL pending workspaces, so dropped runs lose no data.
concurrency:
  group: catalog-merge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    name: "Merge${{ inputs.workspace && format(': {0}', inputs.workspace) || ': all' }}"
    runs-on: ubuntu-latest
    # Skip workflow_run triggers from failed/cancelled extracts
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.0.0

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Merge catalogs
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_WRITE_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          S3_WRITE_SECRET: ${{ secrets.S3_WRITE_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKSPACE: ${{ inputs.workspace }}
          STORAGE: ${{ inputs.storage }}
        run: |
          STORAGE_ARG=""
          if [ -n "$STORAGE" ]; then
            STORAGE_ARG="--storage $STORAGE"
          fi
          if [ -n "$WORKSPACE" ]; then
            uv run .github/scripts/merge_catalog.py \
              --workspace "$WORKSPACE" \
              $STORAGE_ARG
          else
            uv run .github/scripts/merge_catalog.py \
              --all \
              $STORAGE_ARG
          fi
