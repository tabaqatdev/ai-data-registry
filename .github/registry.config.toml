# Registry Platform Configuration
# ================================
# This is the single source of truth for backend definitions and storage config.
# Forks: edit this file and set the corresponding repository secrets.
# All secret VALUES live in GitHub repo settings, not here. This file only
# declares which secret NAMES the workflows and scripts expect.

# Named storage targets
# =====================
# Workspaces declare which storage(s) to use via [tool.registry].storage.
# The first defined storage is the default (used when a workspace omits the field).
# Data is replicated to ALL declared storages simultaneously.
#
# S3 layout (relative to bucket root):
#   s3://{bucket}/{owner}/{repo}/{branch}/catalog.duckdb                        # global DuckLake catalog
#   s3://{bucket}/{owner}/{repo}/{branch}/{schema}/{table}/{timestamp}.parquet  # workspace data
#   s3://{bucket}/{owner}/{repo}/pr/{pr_number}/{workspace}/{table}.parquet     # PR staging
#
# CRITICAL: Catalog uses DuckDB backend (.duckdb), NOT SQLite (.ducklake).
# DuckDB catalogs support remote S3/HTTPS read-only ATTACH. SQLite catalogs do not
# (blocked by duckdb/ducklake#912). This enables direct querying without downloading.

[storage.eu-hetzner]
provider = "hetzner"                          # cloud provider name (informational)
region = "fsn1"                               # provider region (informational)
public = true                                 # whether the bucket is publicly readable
endpoint_url_secret = "S3_ENDPOINT_URL"       # e.g. https://fsn1.your-objectstorage.com
bucket_secret = "S3_BUCKET"                   # e.g. registry
region_secret = "S3_REGION"                   # e.g. fsn1 (optional, depends on provider)
write_key_id_secret = "S3_WRITE_KEY_ID"       # S3 access key with write permission
write_secret_key_secret = "S3_WRITE_SECRET"   # S3 secret key
global_catalog = "catalog.duckdb"             # global catalog filename (single source of truth)
staging_prefix = "pr"                         # PR staging data prefix

[backends.github]
workflow = "extract-github.yml"
flavors = ["ubuntu-latest"]
# No extra secrets needed beyond S3

[backends.hetzner]
workflow = "extract-hetzner.yml"
flavors = ["cax11", "cax21", "cax31", "cax41"]
# Extra secrets needed: HCLOUD_TOKEN, RUNNER_PAT

[backends.huggingface]
workflow = "extract-huggingface.yml"
flavors = ["cpu-basic", "cpu-upgrade", "t4-small", "t4-medium", "l4x1", "a10g-small", "a10g-large", "a10g-largex2", "a100-large"]
# Extra secrets needed: HF_TOKEN
