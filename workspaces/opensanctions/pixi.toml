[workspace]
name = "opensanctions"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "OpenSanctions consolidated default targets filtered to SA influence region (Gulf, ME, major sanctioning contexts)"
schedule = "30 10 * * *"
timeout = 20
tags = ["sanctions", "compliance", "entities", "middle-east", "gulf", "opensanctions"]
schema = "opensanctions"
table = "region_sanctions"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "OpenSanctions"
mixed = false

[tool.registry.checks]
min_rows = 5000
max_null_pct = 60
unique_cols = ["id", "snapshot_date"]
schema_match = true
