[workspace]
name = "infra-osm"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"
quackosm = ">=0.13"
shapely = ">=2.0"
geopandas = ">=1.0"
pyarrow = ">=17"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "OSM infrastructure for SA + Gulf region (power, petroleum, pipelines, telecoms, water), annual refresh"
schedule = "0 3 1 1 *"
timeout = 90
tags = ["osm", "infrastructure", "power", "petroleum", "pipelines", "telecoms", "water", "middle-east"]
schema = "infra-osm"
tables = [
    "power_lines", "power_plants", "power_generators",
    "substations", "power_towers", "switchgear",
    "pipelines", "petroleum_sites", "petroleum_wells",
    "telecoms", "water_infra",
]
mode = "replace"

[tool.registry.runner]
backend = "hetzner"
flavor = "cax21"

[tool.registry.license]
code = "Apache-2.0"
data = "ODbL-1.0"
data_source = "OpenStreetMap via Geofabrik"
mixed = false

[tool.registry.checks]
schema_match = true
geometry = true

[tool.registry.checks.power_lines]
min_rows = 1000

[tool.registry.checks.power_plants]
min_rows = 10
optional = true

[tool.registry.checks.power_generators]
min_rows = 100

[tool.registry.checks.substations]
min_rows = 100

[tool.registry.checks.power_towers]
min_rows = 1000

[tool.registry.checks.switchgear]
min_rows = 10
optional = true

[tool.registry.checks.pipelines]
min_rows = 100

[tool.registry.checks.petroleum_sites]
min_rows = 10
optional = true

[tool.registry.checks.petroleum_wells]
min_rows = 50

[tool.registry.checks.telecoms]
min_rows = 100

[tool.registry.checks.water_infra]
min_rows = 50
