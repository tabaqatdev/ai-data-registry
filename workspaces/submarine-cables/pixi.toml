[workspace]
name = "submarine-cables"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "TeleGeography global submarine cable geometries + landing points, semi-annual refresh"
schedule = "0 5 1 1,7 *"
timeout = 15
tags = ["telegeography", "submarine-cables", "infrastructure", "global", "network-topology"]
schema = "submarine-cables"
tables = ["cables", "landing_points"]
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "TeleGeography Submarine Cable Map (submarinecablemap.com)"
mixed = false

[tool.registry.checks]
schema_match = true
geometry = true

[tool.registry.checks.cables]
min_rows = 500
unique_cols = ["feature_id"]

[tool.registry.checks.landing_points]
min_rows = 1000
unique_cols = ["lp_id"]
