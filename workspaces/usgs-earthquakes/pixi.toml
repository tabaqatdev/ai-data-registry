[workspace]
name = "usgs-earthquakes"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "USGS FDSN earthquake catalog for the ME region (Zagros/Red Sea/Gulf), last 30 days rolling"
schedule = "0 */6 * * *"
timeout = 15
tags = ["usgs", "earthquakes", "seismicity", "zagros", "middle-east"]
schema = "usgs-earthquakes"
table = "events"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC0-1.0"
data_source = "USGS Earthquake Hazards Program (FDSN web service)"
mixed = false

[tool.registry.checks]
min_rows = 0
max_null_pct = 40
geometry = true
unique_cols = ["event_id", "snapshot_time"]
schema_match = true
