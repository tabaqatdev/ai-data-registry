[workspace]
name = "jodi-oil"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "JODI World Primary oil data (production, stocks, flows) filtered to ME/Gulf producers, monthly refresh"
schedule = "0 6 15 * *"
timeout = 25
tags = ["jodi", "oil", "crude", "refined", "middle-east", "gulf", "energy"]
schema = "jodi-oil"
table = "monthly_flows"
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "JODI (Joint Organisations Data Initiative) - Oil"
mixed = false

[tool.registry.checks]
min_rows = 50000
max_null_pct = 40
unique_cols = ["ref_area", "time_period", "energy_product", "flow_breakdown", "unit_measure"]
schema_match = true
