[workspace]
name = "ioda-signals"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "IODA internet-outage signals for 15 ME/Gulf countries (BGP, active probing, Google Transparency, MERIT-NT), last 48h rolling"
schedule = "30 */4 * * *"
timeout = 15
tags = ["internet-outages", "ioda", "connectivity", "middle-east", "bgp", "network"]
schema = "ioda"
table = "signals"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-NC-4.0"
data_source = "IODA (Georgia Tech ACIS / CAIDA)"
mixed = false

[tool.registry.checks]
min_rows = 500
max_null_pct = 40
unique_cols = ["country_code", "datasource", "subtype", "timestamp", "snapshot_time"]
