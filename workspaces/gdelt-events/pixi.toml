[workspace]
name = "gdelt-events"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "GDELT events for Saudi Arabia (event metadata + source URLs), last 7 days rolling"
schedule = "0 4 * * *"
timeout = 20
tags = ["gdelt", "events", "news", "saudi-arabia"]
schema = "gdelt-events"
table = "events"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC0-1.0"
data_source = "GDELT Project (via Source Cooperative tabaqat/gdelt-sa)"
mixed = false

[tool.registry.checks]
min_rows = 10
max_null_pct = 60
geometry = true
unique_cols = ["globaleventid", "snapshot_date"]
schema_match = true
