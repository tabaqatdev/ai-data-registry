[workspace]
name = "nasa-eonet"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "NASA EONET natural events (wildfires, volcanoes, storms, etc.) for the ME region, open + last 30d closed"
schedule = "0 */6 * * *"
timeout = 10
tags = ["natural-events", "nasa", "eonet", "wildfires", "volcanoes", "middle-east"]
schema = "nasa-eonet"
table = "events"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC0-1.0"
data_source = "NASA EONET"
mixed = false

[tool.registry.checks]
min_rows = 0
max_null_pct = 40
geometry = true
unique_cols = ["event_id", "snapshot_time"]
