[workspace]
name = "celestrak-satellites"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "Satellite orbital elements and approximate sub-satellite positions from CelesTrak (7 priority groups)"
schedule = "0 */6 * * *"
timeout = 15
tags = ["satellites", "celestrak", "orbital", "space", "global"]
schema = "celestrak"
table = "satellites"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC0-1.0"
data_source = "CelesTrak / US Space Force"
mixed = false

[tool.registry.checks]
min_rows = 500
max_null_pct = 20
geometry = true
unique_cols = ["norad_cat_id", "snapshot_time"]
