[workspace]
name = "nasa-firms"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "Active fire detections from 3 NASA FIRMS sensors (SUOMI VIIRS, NOAA-20 VIIRS, MODIS) for SA + Gulf region, 24h rolling"
schedule = "0 */3 * * *"
timeout = 15
tags = ["fires", "nasa", "firms", "viirs", "modis", "middle-east", "emergency"]
schema = "nasa-firms"
table = "active_fires"
mode = "append"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC0-1.0"
data_source = "NASA FIRMS"
mixed = false

[tool.registry.checks]
min_rows = 0
max_null_pct = 10
geometry = true
unique_cols = ["sensor", "latitude", "longitude", "acq_date", "acq_time", "snapshot_time"]
schema_match = true
