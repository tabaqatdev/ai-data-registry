[workspace]
name = "who-outbreaks"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "WHO Disease Outbreak News (global) with derived ME-country matches, full history replace"
schedule = "0 7 * * *"
timeout = 15
tags = ["who", "disease", "outbreaks", "health", "mers", "middle-east"]
schema = "who-outbreaks"
table = "outbreaks"
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-NC-SA-3.0-IGO"
data_source = "World Health Organization - Disease Outbreak News"
mixed = false

[tool.registry.checks]
min_rows = 1000
max_null_pct = 40
unique_cols = ["id"]
schema_match = true
