[workspace]
name = "walkthru-indices"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "Pre-aggregated H3 res-5 indices for SA + Gulf: population (2025-2100, SSP2), buildings, terrain"
schedule = "0 4 * * 1"
timeout = 15
tags = ["h3", "population", "buildings", "terrain", "walkthru-earth", "middle-east"]
schema = "walkthru-indices"
tables = ["population_h3r5", "buildings_h3r5", "terrain_h3r5"]
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "Walkthru.Earth Indices v2"
mixed = false

[tool.registry.checks]
schema_match = true

[tool.registry.checks.population_h3r5]
min_rows = 5000
unique_cols = ["h3_index"]

[tool.registry.checks.buildings_h3r5]
min_rows = 5000
unique_cols = ["h3_index"]

[tool.registry.checks.terrain_h3r5]
min_rows = 10000
unique_cols = ["h3_index"]
