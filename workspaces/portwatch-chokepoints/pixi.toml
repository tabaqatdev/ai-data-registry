[workspace]
name = "portwatch-chokepoints"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<4"

[pypi-dependencies]
duckdb = ">=1.5.2"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[tool.registry]
description = "IMF PortWatch daily chokepoint transits (Hormuz + Bab el-Mandeb + Suez) with static chokepoint reference table"
schedule = "0 4 * * *"
timeout = 20
tags = ["portwatch", "imf", "shipping", "chokepoints", "hormuz", "bab-el-mandeb", "suez", "middle-east"]
schema = "portwatch"
tables = ["chokepoints", "daily_transits"]
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "IMF PortWatch (UN Global Platform ArcGIS FeatureServer)"
mixed = false

[tool.registry.checks]
schema_match = true
geometry = true

[tool.registry.checks.chokepoints]
min_rows = 20
unique_cols = ["portid"]

[tool.registry.checks.daily_transits]
min_rows = 1000
unique_cols = ["portid", "date"]
